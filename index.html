<!doctype html>
<!--
╔══════════════════════════════════════════════════════════════════╗
║              EXERCÍCIO — ESQUINA DO SABOR                        ║
║          Estrutura Semântica HTML5 + Estilização CSS             ║
╠══════════════════════════════════════════════════════════════════╣
║                                                                  ║
║  O que você vai fazer:                                           ║
║  1. Completar a estrutura semântica desta página                 ║
║  2. Adaptar o conteúdo com o tema de restaurante que você        ║
║     escolher (nome, pratos, história, etc.)                      ║
║  3. Criar o estilo visual no arquivo styles.css                  ║
║                                                                  ║
║  Arquivos do exercício:                                          ║
║  → index.html    (este arquivo — edite aqui)                     ║
║  → styles.css    (crie os estilos aqui)                          ║
║  → exemplo.html  (referência — consulte, não edite)              ║
║  → guia-html.html (guia completo de HTML — use como dicionário)  ║
║  → guia-css.html  (guia completo de CSS — use como dicionário)   ║
║                                                                  ║
║  Dica: abra o exemplo.html no navegador para ver como           ║
║  a página pode ficar. Depois volte aqui e construa a sua.        ║
╚══════════════════════════════════════════════════════════════════╝
-->

<!--
  TODO 1 ── Defina o idioma correto da página.
  ─────────────────────────────────────────────
  O atributo lang no <html> informa ao navegador e ao Google
  em qual idioma o conteúdo está escrito.
  

  ✏️  Troque o atributo abaixo pelo valor correto.
  📖  Referência: guia-html.html → Seção 1 "Estrutura base"
-->
<html lang="TROQUE-AQUI">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />

		<!--
    TODO 2 ── Defina o título da aba do navegador.
    ──────────────────────────────────────────────
    A tag <title> controla o texto que aparece na aba do navegador
    e nos resultados de busca do Google.

    ✏️  Escreva o nome do seu restaurante dentro da tag abaixo.
  -->
		<title>NOME DO SEU RESTAURANTE</title>

		<!--
    A linha abaixo conecta este HTML ao seu arquivo de estilos.
    Não altere — ela já está configurada corretamente.
  -->
		<link rel="stylesheet" href="[nome do arquivo.css]" />

		<!--
    FONTES DO GOOGLE (opcional, mas recomendado)
    ─────────────────────────────────────────────
    As linhas abaixo importam duas fontes gratuitas do Google Fonts:
    → "Playfair Display" — fonte elegante para títulos
    → "Lato"            — fonte limpa para textos

    Para usar no CSS: font-family: 'Playfair Display', serif;
                      font-family: 'Lato', sans-serif;

    Você pode trocar por outras fontes em: https://fonts.google.com
    Não precisa alterar agora — volte aqui depois se quiser.
  -->
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Lato:wght@400;700&display=swap"
			rel="stylesheet"
		/>
	</head>

	<body>
		<!-- ============================================================
    BLOCO 1: CABEÇALHO DA PÁGINA
    ================================================================

    TODO 3 ── Adicione a tag semântica de cabeçalho.
    ──────────────────────────────────────────────────
    O cabeçalho da página deve ser marcado com a tag <header>.
    Ele fica no TOPO e contém o nome/logo do restaurante
    e o menu de navegação.

    ✏️  Envolva TODO o conteúdo abaixo (até o comentário
        "FIM DO CABEÇALHO") com as tags <header> e </header>.

    📖  Referência: guia-html.html → Seção 2 "Tags semânticas"
    👁️  Veja como fica: exemplo.html → bloco <header>
  ============================================================ -->

		<!--
      TODO 4 ── Personalize o nome e slogan do restaurante.
      ──────────────────────────────────────────────────────
      ✏️  Troque "Esquina do Sabor" pelo nome que você escolheu.
          Troque o parágrafo pelo slogan do seu restaurante.
      ⚠️  Mantenha as tags <h1> e <p> — apenas mude o conteúdo.
    -->
		<h1>Esquina do Sabor</h1>
		<p>Sabor de verdade, feito com carinho 🍴</p>

		<!--
      TODO 5 ── Crie o menu de navegação.
      ─────────────────────────────────────
      A navegação principal de um site usa a tag <nav>.
      Dentro dela, os links ficam em uma lista não-ordenada (<ul>),
      e cada link é um item de lista (<li>) com um link (<a>).

      Os links usam "#" seguido do id de cada seção para
      levar o usuário direto ao conteúdo ao clicar.

      ✏️  Substitua este comentário pela estrutura de navegação.
          Use as 4 seções: #inicio, #menu, #sobre, #contato

      Estrutura esperada:
      ┌─────────────────────────────┐
      │ <nav>                       │
      │   <ul>                      │
      │     <li><a href="#inicio">  │
      │     <li><a href="#menu">    │
      │     <li><a href="#sobre">   │
      │     <li><a href="#contato"> │
      │   </ul>                     │
      │ </nav>                      │
      └─────────────────────────────┘

      📖  Referência: guia-html.html → Seção 2 "Tags semânticas"
    -->

		<!-- FIM DO CABEÇALHO -->

		<!-- ============================================================
    BLOCO 2: CONTEÚDO PRINCIPAL
    ================================================================

    TODO 6 ── Adicione a tag de conteúdo principal.
    ─────────────────────────────────────────────────
    A tag <main> marca o conteúdo central e único da página.
    Deve existir apenas UMA vez por documento.

    ✏️  Envolva TODO o conteúdo abaixo (até o comentário
        "FIM DO CONTEÚDO PRINCIPAL") com <main> e </main>.

    📖  Referência: guia-html.html → Seção 2 "Tags semânticas"
  ============================================================ -->

		<!-- ----------------------------------------------------------
      SEÇÃO: INÍCIO
      ────────────────────────────────────────────────────────────

      TODO 7 ── Crie a seção de boas-vindas.
      ────────────────────────────────────────
      Uma <section> agrupa conteúdos de um mesmo tema.
      O atributo id="inicio" permite que o link do menu
      (#inicio) role a página até aqui.

      ✏️  Substitua este comentário por uma <section id="inicio">
          contendo:
          → Um <h2> de boas-vindas (ex: "Bem-vindo!")
          → Um <p> convidando o visitante a explorar o menu

      ✏️  Personalize com o tema do seu restaurante.

      📖  Referência: guia-html.html → Seção 3 "Hierarquia"
    ---------------------------------------------------------- -->

		<!-- ----------------------------------------------------------
      SEÇÃO: MENU DE PRATOS
      ────────────────────────────────────────────────────────────

      TODO 8 ── Crie a seção do cardápio com os pratos.
      ──────────────────────────────────────────────────
      A tag <article> representa conteúdo independente — cada
      prato é um artigo porque pode existir por si só.

      ✏️  Substitua este comentário por uma <section id="menu">
          contendo:
          → Um <h2> "Nosso Cardápio" (ou nome que preferir)
          → Três <article>, um para cada prato do seu restaurante

          Cada <article> deve ter:
          ┌─────────────────────────────────┐
          │ <article>                       │
          │   <h3>Nome do prato</h3>        │
          │   <p>Descrição curta</p>        │
          │   <p class="preco">R$ 00,00</p> │
          │ </article>                      │
          └─────────────────────────────────┘

      ✏️  Invente pratos coerentes com o tema do seu restaurante!

      📖  Referência: guia-html.html → Seção 2, tabela de tags

    ---------------------------------------------------------- -->

		<!-- ----------------------------------------------------------
      SEÇÃO: SOBRE NÓS
      ────────────────────────────────────────────────────────────

      TODO 9 ── Crie a seção de apresentação do restaurante.
      ───────────────────────────────────────────────────────
      ✏️  Substitua este comentário por uma <section id="sobre">
          contendo:
          → Um <h2> "Sobre Nós"
          → Dois <p> contando a história fictícia do restaurante
            (quando foi fundado, qual é a proposta, o chef, etc.)

      ✏️  Seja criativo — invente uma história para o lugar!

    ---------------------------------------------------------- -->

		<!-- ----------------------------------------------------------
      SEÇÃO: CONTATO
      ────────────────────────────────────────────────────────────

      TODO 10 ── Crie a seção de contato com formulário.
      ────────────────────────────────────────────────────
      Um formulário coleta dados do usuário. Cada campo precisa
      de um <label> associado pelo atributo "for" ao "id" do input.
      Isso é importante para acessibilidade.

      ✏️  Substitua este comentário por uma <section id="contato">
          contendo:
          → Um <h2> "Contato" (ou "Fale Conosco", etc.)
          → Um <form> com os campos:

          ┌────────────────────────────────────────────────┐
          │ <label for="nome">Nome</label>                 │
          │ <input type="text" id="nome" name="nome" />    │
          │                                                │
          │ <label for="email">E-mail</label>              │
          │ <input type="email" id="email" name="email" /> │
          │                                                │
          │ <label for="msg">Mensagem</label>              │
          │ <textarea id="msg" name="msg"></textarea>      │
          │                                                │
          │ <button type="submit">Enviar</button>          │
          └────────────────────────────────────────────────┘

      📖  Referência: guia-html.html → Seção 5 "Formulários"
    ---------------------------------------------------------- -->

		<!-- FIM DO CONTEÚDO PRINCIPAL -->

		<!-- ============================================================
    BLOCO 3: RODAPÉ
    ================================================================

    TODO 11 ── Adicione o rodapé da página.
    ─────────────────────────────────────────
    O rodapé usa a tag semântica <footer> e fica no final
    da página. Geralmente contém copyright e informações legais.

    ✏️  Substitua este comentário por um <footer> contendo
        um <p> com o texto de copyright do seu restaurante.
        Exemplo: © 2024 Nome do Restaurante. Todos os direitos reservados.

    📖  Referência: guia-html.html → Seção 2 "Tags semânticas"
  ============================================================ -->
	</body>
</html>
